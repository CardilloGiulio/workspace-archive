<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1 - Calculator</title>
    <link rel="stylesheet" href="../CSS/stylesheet.css">
</head>

<body>
    <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
        <img id="themeIcon" src="../Images/System/day.png" alt="Dark mode icon">
    </button>
    <nav class="nav-bar">
        <a href="Exercise1.html" class="nav-link active">Exercise 1</a>
        <a href="Exercise2.html" class="nav-link">Exercise 2</a>
        <a href="Exercise3.html" class="nav-link">Exercise 3</a>
        <!-- Add for new exercises -->
    </nav>

    <main>
        <header>
            <h1>Exercise 1</h1>
            <p>Creating a simple calculator.</p>
        </header>

        <section class="calculator-container">
            <div class="calculator">
                <div class="display" role="status" aria-live="polite">0</div>

                <div class="buttons">
                    <div class="button-row">
                        <button class="btn btn-clear">C</button>
                        <button class="btn btn-sign">±</button>
                        <button class="btn btn-percent">%</button>
                        <button class="btn btn-operator">/</button>
                    </div>

                    <div class="button-row">
                        <button class="btn btn-number">7</button>
                        <button class="btn btn-number">8</button>
                        <button class="btn btn-number">9</button>
                        <button class="btn btn-operator">*</button>
                    </div>

                    <div class="button-row">
                        <button class="btn btn-number">4</button>
                        <button class="btn btn-number">5</button>
                        <button class="btn btn-number">6</button>
                        <button class="btn btn-operator">-</button>
                    </div>

                    <div class="button-row">
                        <button class="btn btn-number">1</button>
                        <button class="btn btn-number">2</button>
                        <button class="btn btn-number">3</button>
                        <button class="btn btn-operator">+</button>
                    </div>

                    <div class="button-row">
                        <button class="btn btn-number btn-zero">0</button>
                        <button class="btn btn-decimal">.</button>
                        <button class="btn btn-equals">=</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="../Javascript/exercise1.js"></script>
    <script src="../Javascript/theme.js"></script>
</body>
</html>
